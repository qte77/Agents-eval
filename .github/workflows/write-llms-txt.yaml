# Generates a spec-compliant llms.txt index file per https://llmstxt.org/
#
# Approach: Semi-static (current)
#   Generic skeleton in .github/templates/llms.txt.tpl (reusable across projects).
#   Project-specific additions in .github/templates/llms.txt.additions.tpl (optional).
#   Update the relevant template when docs structure changes.
#
# Alternative approaches:
#   Auto-generated: Walk docs/ at build time, produce sections from directory
#     structure. Maintenance-free but less curated. Could use a script like
#     https://github.com/itsitgroup/repo2txt or a custom docs/ tree walker.
#   Hybrid: Maintain a docs/llms-txt-template.md with mustache-style placeholders,
#     have the workflow fill dynamic sections (e.g. auto-list landscape/ docs)
#     while keeping curated sections static.

name: Write repo llms.txt

on:
  push:
    branches: [main]
    paths:
      - '.github/templates/llms.txt.tpl'
      - '.github/templates/llms.txt.additions.tpl'
      - 'docs/**'
      - '!docs/llms.txt'
      - 'src/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'AGENTS.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate template links exist
        run: |
          stale=0
          validate_tpl() {
            for path in $(grep -oE '\$\{BLOB\}/[^)]+' "$1" | sed 's|\${BLOB}/||'); do
              if [ ! -f "$path" ]; then
                echo "::error::Stale link in $1: $path"
                stale=1
              fi
            done
          }
          validate_tpl .github/templates/llms.txt.tpl
          [ -f .github/templates/llms.txt.additions.tpl ] && \
            validate_tpl .github/templates/llms.txt.additions.tpl
          exit $stale

      - name: Generate llms.txt from template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          BLOB="https://github.com/${REPO}/blob/main"
          PROJECT_NAME=$(sed -n 's/^# //p' README.md | head -1)
          PROJECT_DESC=$(curl -sf -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}" | jq -r '.description // empty')
          export BLOB PROJECT_NAME PROJECT_DESC
          envsubst '${BLOB} ${PROJECT_NAME} ${PROJECT_DESC}' < .github/templates/llms.txt.tpl > docs/llms.txt
          if [ -f .github/templates/llms.txt.additions.tpl ]; then
            envsubst '${BLOB}' < .github/templates/llms.txt.additions.tpl >> docs/llms.txt
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/llms.txt
          git diff --cached --quiet && echo "No changes to llms.txt" && exit 0
          git commit -m "docs: update llms.txt index"
          git push

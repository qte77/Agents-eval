---
name: Paint Contribution Graph

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to render on contribution graph"
        required: true
        default: "HI"
      dry_run:
        description: "Preview only (no push)"
        type: boolean
        default: true
      inverse:
        description: "Invert colors (use with heavy existing activity)"
        type: boolean
        default: false

jobs:
  paint:
    runs-on: ubuntu-latest
    steps:
      - uses: qte77/gha-contribution-ascii@v1
        with:
          TEXT: ${{ inputs.text }}
          TOKEN: ${{ secrets.CONTRIBUTION_PAT }}
          DRY_RUN: ${{ inputs.dry_run }}
          INVERSE: ${{ inputs.inverse }}
...

---
# https://github.com/james-willett/mkdocs-material-youtube-tutorial
# https://mkdocstrings.github.io/recipes/
# site info set in workflow
site_name: '<gha_sed_site_name_here>'
site_description: '<gha_sed_site_description_here>'
repo_url: '<gha_sed_repo_url_here>'
edit_uri: edit/main
theme:
  name: material
  language: en
  features:
    - content.code.annotation
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        # icon: material/brightness-7
        icon: material/toggle-switch-off-outline 
        name: "Toggle Dark Mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        # icon: material/brightness-4
        icon: material/toggle-switch
        name: "Toggle Light Mode"
nav:
  - Home: index.md
  - User Story: UserStory.md
  - Architecture: architecture.md
  - Roadmap: roadmap.md
  - Sprints: sprints/index.md
  - Code: docstrings.md
  - How-Tos:
      - PeerRead Agent Usage: howtos/peerread-agent-usage.md
      - Maintaining AGENTS.md: howtos/maintaining-agents-md.md
  - Best Practices:
      - Testing Strategy: best-practices/testing-strategy.md
      - BDD: best-practices/bdd-best-practices.md
      - TDD: best-practices/tdd-best-practices.md
      - Python: best-practices/python-best-practices.md
      - MAS Design Principles: best-practices/mas-design-principles.md
      - MAS Security: best-practices/mas-security.md
      - Troubleshooting: best-practices/troubleshooting.md
  - Analysis:
      - AgentBeats Basics: analysis/AgentBeats_basics.md
      - Agent Teams Orchestration: analysis/CC-agent-teams-orchestration.md
      - Fast Mode Analysis: analysis/CC-fast-mode-analysis.md
      - Skills Ralph Adoption: analysis/CC-skills-Ralph-adoption-plan.md
      - Inference Providers: analysis/Inference-Providers.md
      - AGENTS.md Refactor Plan: analysis/agents-md-refactor-plan.md
      - MAS Best Practices: analysis/benchmark_mas_best_practices.md
      - Core Principles 80/20: analysis/core-principles-8020-analysis.md
      - Production Agent Patterns: analysis/production-agent-patterns-gap-analysis.md
      - Spec Kit Adoption: analysis/spec-kit-adoption-plan.md
  - Landscape:
      - Overview: landscape/landscape.md
      - Agent Frameworks: landscape/landscape-agent-frameworks-infrastructure.md
      - Evaluation Data: landscape/landscape-evaluation-data-resources.md
      - Research Agents: landscape/landscape-research-agents.md
      - Eval Metrics: landscape/agent_eval_metrics.md
      - Trace & Observe: landscape/trace_observe_methods.md
  - Research:
      - Further Reading: research/further_reading.md
      - Integration Analysis: research/research_integration_analysis.md
  - Security: security-advisories.md
  - Contributing: CONTRIBUTING.md
  - Agents: AGENTS.md
  - Change Log: CHANGELOG.md
  - License: LICENSE.md
plugins:
  - search:
      lang: en
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: true
            show_object_full_path: false
            show_root_members_full_path: false
            show_category_heading: true
            show_submodules: true
markdown_extensions:
  - attr_list
  - pymdownx.magiclink
  - pymdownx.tabbed
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - sane_lists
  - smarty
  - toc:
      permalink: true
validation:
  links:
    not_found: warn
    anchors: warn
# builds only if validation succeeds while
# threating warnings as errors
# also checks for broken links
strict: true
...
